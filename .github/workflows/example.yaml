name: Deploy example site to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./package
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            package
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: "./package/package-lock.json"
      - name: Install deps for package
        run: npm ci
      - name: Build package
        run: npm run build
      - name: Pack package
        run: npm pack
      - uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: "package/*.tgz"
          archive: false
